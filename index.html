<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Олимпиадская застава</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Tailwind + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* нижняя навигация как в телеграме */
        .bottom-nav {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(20px);
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.05);
        }
        .nav-item {
            transition: all 0.2s;
            border-radius: 30px;
        }
        .nav-item.active {
            background: #eef2ff;
            color: #4f46e5;
        }
        .quiz-option {
            transition: 0.1s;
            border: 1px solid #e2e8f0;
        }
        .quiz-option.selected {
            background: #eef2ff;
            border-color: #4f46e5;
        }
        .modal-photo {
            max-height: 150px;
            object-fit: contain;
            border-radius: 16px;
        }
        /* скроллы */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-20">

<div id="authScreen" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-indigo-800 to-indigo-900">
    <div class="bg-white rounded-3xl shadow-xl max-w-md w-full p-6">
        <div class="text-center mb-5"><i class="fas fa-shield-alt text-5xl text-indigo-600"></i><h1 class="text-2xl font-bold mt-2">Олимпиадская застава</h1></div>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" class="w-full border rounded-xl p-3 mb-3" required>
            <input type="password" id="loginPassword" placeholder="Пароль" class="w-full border rounded-xl p-3 mb-4" required>
            <button class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold">Войти</button>
        </form>
        <p class="text-xs text-center text-gray-400 mt-4">Аккаунты создаёт администратор</p>
    </div>
</div>

<div id="mainApp" class="hidden min-h-screen flex flex-col">
    <!-- Верхняя панель с приветствием -->
    <div class="bg-white px-5 pt-6 pb-2 shadow-sm sticky top-0 z-10">
        <div class="flex justify-between items-start">
            <div>
                <div id="greetingText" class="text-sm text-gray-500"></div>
                <div id="userDisplayName" class="text-xl font-bold text-gray-800"></div>
            </div>
            <div class="bg-indigo-100 w-12 h-12 rounded-full flex items-center justify-center text-indigo-700 text-xl font-semibold" id="avatarInitial"></div>
        </div>
    </div>

    <!-- Контентная область -->
    <div class="flex-1 p-4 pb-24 overflow-y-auto">
        <div id="tasksPanel" class="tab-content w-full">
            <div id="tasksListContainer" class="space-y-4"></div>
        </div>
        <div id="constructorPanel" class="tab-content hidden w-full">
            <div class="bg-white rounded-2xl p-4 shadow-sm mb-6">
                <h2 class="text-lg font-bold mb-3">Новое задание</h2>
                <input type="text" id="taskName" placeholder="Название" class="w-full border rounded-xl p-2 mb-2">
                <input type="text" id="taskClass" placeholder="Класс (7А, 8Б)" class="w-full border rounded-xl p-2 mb-4">
                <div id="elementsContainer" class="space-y-4 max-h-96 overflow-auto mb-4"></div>
                <div class="flex gap-2 mb-4 flex-wrap">
                    <button id="addTextBtn" class="bg-gray-100 px-3 py-1.5 rounded-full text-sm"><i class="fas fa-paragraph mr-1"></i> Текст</button>
                    <button id="addChoiceBtn" class="bg-gray-100 px-3 py-1.5 rounded-full text-sm"><i class="fas fa-list mr-1"></i> Вопрос с выбором</button>
                    <button id="addTextareaBtn" class="bg-gray-100 px-3 py-1.5 rounded-full text-sm"><i class="fas fa-edit mr-1"></i> Текстовое поле</button>
                </div>
                <button id="publishTaskBtn" class="bg-green-600 w-full text-white py-2 rounded-xl font-semibold">Опубликовать</button>
            </div>
            <div class="bg-white rounded-2xl p-4"><h3 class="font-bold mb-2">Мои задания</h3><div id="myPublishedTasks" class="space-y-2"></div></div>
        </div>
        <div id="profilePanel" class="tab-content hidden w-full">
            <div class="bg-white rounded-2xl p-5 shadow-sm text-center">
                <div class="w-24 h-24 bg-indigo-100 rounded-full mx-auto flex items-center justify-center text-3xl font-bold text-indigo-700 mb-3" id="profileAvatar"></div>
                <h2 id="profileName" class="text-xl font-bold"></h2>
                <p id="profileEmail" class="text-gray-500 text-sm"></p>
                <p class="mt-1"><span class="font-semibold">Роль:</span> <span id="profileRole"></span> &nbsp;|&nbsp; <span class="font-semibold">Класс:</span> <span id="profileClass"></span></p>
                <button id="logoutBtnBottom" class="mt-6 bg-red-500 text-white py-2 px-5 rounded-xl w-full">Выйти</button>
            </div>
        </div>
    </div>

    <!-- Нижняя навигация (Telegram-style) -->
    <div class="bottom-nav fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-gray-100 flex justify-around items-center py-2 px-4 z-20">
        <button data-nav="tasks" class="nav-item flex flex-col items-center py-1 px-4 rounded-full text-gray-600"><i class="fas fa-tasks text-xl"></i><span class="text-xs mt-1">Задания</span></button>
        <button data-nav="constructor" class="nav-item mentor-only flex flex-col items-center py-1 px-4 rounded-full text-gray-600"><i class="fas fa-pen-ruler text-xl"></i><span class="text-xs mt-1">Конструктор</span></button>
        <button data-nav="profile" class="nav-item flex flex-col items-center py-1 px-4 rounded-full text-gray-600"><i class="fas fa-user-circle text-xl"></i><span class="text-xs mt-1">Профиль</span></button>
    </div>
</div>

<!-- Модалка прохождения с результатом внутри -->
<div id="quizModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[80vh] flex flex-col">
        <div class="p-4 border-b flex justify-between items-center"><h2 id="modalTaskTitle" class="font-bold text-lg"></h2><button id="closeModalBtn" class="text-2xl">&times;</button></div>
        <div id="quizContent" class="flex-1 overflow-auto p-4 space-y-4"></div>
        <div class="p-3 border-t flex justify-between">
            <button id="quizPrev" class="bg-gray-200 px-4 py-2 rounded-xl disabled:opacity-40">Назад</button>
            <span id="quizStepCounter" class="text-sm text-gray-500 self-center"></span>
            <button id="quizNext" class="bg-indigo-600 text-white px-4 py-2 rounded-xl">Далее</button>
            <button id="quizFinal" class="bg-green-600 text-white px-4 py-2 rounded-xl hidden">Завершить</button>
        </div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyDT6xPjDxldqrmjWuG-VF7AVoot-RFUkH0", authDomain: "olymp-e7d79.firebaseapp.com", projectId: "olymp-e7d79", storageBucket: "olymp-e7d79.firebasestorage.app", messagingSenderId: "212523217131", appId: "1:212523217131:web:6acdbf9443cf4f22440eae" };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.firestore();

    let currentUserObj = null, userRole = null, userClass = null, userDisplayName = "Пользователь";
    let currentTask = null, currentAnswers = [], currentElements = [], currentStep = 0;

    function showModalMessage(title, text, isError=false) {
        // простая замена тоста — модалка или alert? но сделаем аккуратный диалог:
        alert(`${title}\n${text}`);
    }

    async function loadUserData(uid) {
        let doc = await db.collection("users").doc(uid).get();
        if(doc.exists) {
            userRole = doc.data().role;
            userClass = doc.data().class || "";
            userDisplayName = doc.data().displayName || doc.data().email?.split('@')[0] || "Ученик";
            return true;
        } else { alert("Роль не назначена администратором"); return false; }
    }

    auth.onAuthStateChanged(async (u) => {
        if(u) {
            currentUserObj = u;
            let ok = await loadUserData(u.uid);
            if(!ok) { auth.signOut(); return; }
            document.getElementById("authScreen").classList.add("hidden");
            document.getElementById("mainApp").classList.remove("hidden");
            updateProfileUI();
            setGreeting();
            if(userRole === "mentor") document.querySelectorAll(".mentor-only").forEach(el=>el.classList.remove("hidden"));
            else document.querySelectorAll(".mentor-only").forEach(el=>el.classList.add("hidden"));
            switchNav("tasks");
            loadTasks();
            if(userRole==="mentor") loadMyTasksForMentor();
        } else {
            document.getElementById("authScreen").classList.remove("hidden");
            document.getElementById("mainApp").classList.add("hidden");
        }
    });
    document.getElementById("loginForm").addEventListener("submit", async(e)=>{
        e.preventDefault();
        let email = document.getElementById("loginEmail").value, pwd = document.getElementById("loginPassword").value;
        try { await auth.signInWithEmailAndPassword(email,pwd); } catch(err) { alert("Ошибка: "+err.message); }
    });

    function updateProfileUI() {
        document.getElementById("userDisplayName").innerText = userDisplayName;
        document.getElementById("profileName").innerText = userDisplayName;
        document.getElementById("profileEmail").innerText = currentUserObj?.email || "";
        document.getElementById("profileRole").innerText = (userRole === "mentor" ? "Наставник" : "Ученик");
        document.getElementById("profileClass").innerText = userClass || "—";
        let initial = userDisplayName.charAt(0).toUpperCase();
        document.getElementById("avatarInitial").innerText = initial;
        document.getElementById("profileAvatar").innerText = initial;
    }
    function setGreeting() {
        let hour = new Date().getHours();
        let text = hour < 12 ? "Доброе утро" : (hour < 18 ? "Добрый день" : "Добрый вечер");
        document.getElementById("greetingText").innerHTML = `${text},`;
    }
    function switchNav(tab) {
        document.querySelectorAll(".tab-content").forEach(el=>el.classList.add("hidden"));
        document.getElementById(`${tab}Panel`).classList.remove("hidden");
        document.querySelectorAll(".nav-item").forEach(btn=>btn.classList.remove("active"));
        document.querySelector(`[data-nav="${tab}"]`)?.classList.add("active");
        if(tab === "constructor" && userRole==="mentor") renderConstructorUI();
    }
    document.querySelectorAll("[data-nav]").forEach(btn=>btn.addEventListener("click",()=>switchNav(btn.dataset.nav)));
    document.getElementById("logoutBtnBottom")?.addEventListener("click",()=>auth.signOut());

    async function loadTasks() {
        let container = document.getElementById("tasksListContainer");
        container.innerHTML = '<div class="text-center p-4">Загрузка...</div>';
        let q = await db.collection("tasks").where("published","==",true).get();
        let tasks = [];
        q.forEach(doc=>{ let d = doc.data(); if(userRole==="student" && d.targetClass !== userClass) return; tasks.push({id:doc.id, ...d}); });
        if(tasks.length===0) { container.innerHTML='<div class="text-center text-gray-400">Нет заданий</div>'; return; }
        container.innerHTML = "";
        tasks.forEach(t=>{
            let card = document.createElement("div");
            card.className = "bg-white rounded-xl shadow p-4";
            card.innerHTML = `<div class="font-bold">${escapeHtml(t.title)}</div><div class="text-sm text-gray-500">Класс: ${t.targetClass} | Этапов: ${t.elements?.length||0}</div><button data-id="${t.id}" class="task-start mt-3 bg-indigo-50 text-indigo-700 py-1.5 px-3 rounded-xl w-full">${userRole==="student"?"Начать":"Посмотреть"}</button>`;
            container.appendChild(card);
        });
        document.querySelectorAll(".task-start").forEach(btn=>btn.addEventListener("click", async(e)=>{
            let id = btn.dataset.id;
            let snap = await db.collection("tasks").doc(id).get();
            if(snap.exists) {
                currentTask = {id:snap.id, ...snap.data()};
                if(userRole === "student") startQuiz();
                else alert("Режим просмотра наставника");
            }
        }));
    }

    // ---------- КОНСТРУКТОР С ФОТО ----------
    let elementsStore = []; // {type, content, options, correct, points, imageBase64}
    function renderConstructorUI() {
        let container = document.getElementById("elementsContainer");
        if(!container) return;
        container.innerHTML = "";
        elementsStore.forEach((el, idx) => {
            let div = document.createElement("div");
            div.className = "border rounded-xl p-3 bg-gray-50";
            div.innerHTML = `<div class="flex justify-between items-center"><b>${el.type==='text'?'Текст':el.type==='choice'?'Выбор ответа':'Текстовое поле'}</b><button data-idx="${idx}" class="delElem text-red-500 text-sm">Удалить</button></div>`;
            if(el.type === 'text') {
                div.innerHTML += `<textarea class="w-full border p-2 rounded mt-1" placeholder="Текст">${el.content||''}</textarea><input placeholder="Баллы (0)" class="w-24 border p-1 mt-1" value="${el.points||0}">`;
            } else if(el.type === 'choice') {
                div.innerHTML += `<input placeholder="Вопрос" class="w-full border p-2 mt-1" value="${el.content||''}"><div class="mt-1">Варианты (через запятую): <input class="w-full border p-1 options-input" value="${(el.options||[]).join(',')}"></div><div>Правильные (индексы 0..): <input class="w-full border p-1 correct-input" value="${(el.correct||[]).join(',')}"></div><input placeholder="Макс балл" class="w-24 border p-1 mt-1 points-input" value="${el.points||1}">`;
            } else {
                div.innerHTML += `<textarea class="w-full border p-2 mt-1" placeholder="Текст вопроса">${el.content||''}</textarea><input placeholder="Баллы" class="w-24 border p-1 mt-1 points-input" value="${el.points||1}">`;
            }
            // фото
            if(el.imageBase64) div.innerHTML += `<div class="mt-2"><img src="${el.imageBase64}" class="h-16 rounded border"><button data-idx="${idx}" class="remove-photo text-xs text-red-500 mt-1">Удалить фото</button></div>`;
            div.innerHTML += `<button data-idx="${idx}" class="add-photo-btn text-xs bg-gray-200 px-2 py-1 rounded mt-2">📷 Добавить фото</button><input type="file" accept="image/*" class="photo-file hidden" data-idx="${idx}">`;
            container.appendChild(div);
        });
        // обработчики
        document.querySelectorAll(".delElem").forEach(btn=>btn.addEventListener("click",(e)=>{ let i=btn.dataset.idx; elementsStore.splice(i,1); renderConstructorUI(); }));
        document.querySelectorAll(".add-photo-btn").forEach(btn=>btn.addEventListener("click",(e)=>{
            let idx=btn.dataset.idx; let fileInput = btn.parentElement.querySelector(".photo-file"); fileInput.click();
            fileInput.onchange = (ev)=>{
                let file = ev.target.files[0];
                if(file){
                    let reader = new FileReader();
                    reader.onload = (re)=> { elementsStore[idx].imageBase64 = re.target.result; renderConstructorUI(); };
                    reader.readAsDataURL(file);
                }
            };
        }));
        document.querySelectorAll(".remove-photo").forEach(btn=>btn.addEventListener("click",(e)=>{ let i=btn.dataset.idx; elementsStore[i].imageBase64 = null; renderConstructorUI(); }));
    }
    document.getElementById("addTextBtn")?.addEventListener("click",()=>{ elementsStore.push({type:"text", content:"", points:0, imageBase64:null}); renderConstructorUI(); });
    document.getElementById("addChoiceBtn")?.addEventListener("click",()=>{ elementsStore.push({type:"choice", content:"", options:[], correct:[], points:1, imageBase64:null}); renderConstructorUI(); });
    document.getElementById("addTextareaBtn")?.addEventListener("click",()=>{ elementsStore.push({type:"textarea", content:"", points:1, imageBase64:null}); renderConstructorUI(); });
    document.getElementById("publishTaskBtn")?.addEventListener("click", async()=>{
        let title = document.getElementById("taskName").value, targetClass = document.getElementById("taskClass").value;
        if(!title || !targetClass) { alert("Заполните название и класс"); return; }
        let finalElems = [];
        let wrappers = document.querySelectorAll("#elementsContainer > div");
        for(let i=0;i<elementsStore.length;i++){
            let el = elementsStore[i];
            let wrap = wrappers[i];
            if(el.type === 'text') {
                let content = wrap.querySelector("textarea")?.value;
                let pts = parseInt(wrap.querySelector("input[placeholder*='Баллы']")?.value)||0;
                finalElems.push({type:"text", content, points:pts, imageBase64: el.imageBase64 || null});
            } else if(el.type === 'choice') {
                let content = wrap.querySelector("input[placeholder='Вопрос']")?.value;
                let optsRaw = wrap.querySelector(".options-input")?.value; let options = optsRaw.split(",").map(s=>s.trim());
                let correctRaw = wrap.querySelector(".correct-input")?.value; let correct = correctRaw.split(",").map(s=>parseInt(s.trim())).filter(n=>!isNaN(n));
                let pts = parseInt(wrap.querySelector(".points-input")?.value)||1;
                finalElems.push({type:"choice", content, options, correctAnswer:correct, points:pts, imageBase64: el.imageBase64||null});
            } else {
                let content = wrap.querySelector("textarea")?.value;
                let pts = parseInt(wrap.querySelector(".points-input")?.value)||1;
                finalElems.push({type:"textarea", content, points:pts, imageBase64: el.imageBase64||null});
            }
        }
        if(finalElems.length===0) { alert("Добавьте хотя бы один элемент"); return; }
        await db.collection("tasks").add({ title, targetClass, elements:finalElems, published:true, createdBy:currentUserObj.uid, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert("Задание опубликовано!");
        elementsStore = []; renderConstructorUI(); document.getElementById("taskName").value=""; document.getElementById("taskClass").value="";
        loadMyTasksForMentor(); loadTasks();
    });
    async function loadMyTasksForMentor(){
        if(userRole!=="mentor") return;
        let snap = await db.collection("tasks").where("createdBy","==",currentUserObj.uid).get();
        let cont = document.getElementById("myPublishedTasks");
        cont.innerHTML = "";
        snap.forEach(doc=>{ cont.innerHTML += `<div class="border-b py-2 flex justify-between"><span>${doc.data().title} (${doc.data().targetClass})</span><button data-id="${doc.id}" class="delMine text-red-500 text-sm">Удалить</button></div>`; });
        document.querySelectorAll(".delMine").forEach(btn=>btn.addEventListener("click", async(e)=>{ if(confirm("Удалить?")){ await db.collection("tasks").doc(btn.dataset.id).delete(); loadMyTasksForMentor(); loadTasks(); } }));
    }

    // ---------- ПРОХОЖДЕНИЕ С ФОТО и РЕЗУЛЬТАТОМ В ОКНЕ ----------
    async function startQuiz() {
        let existing = await db.collection("results").where("taskId","==",currentTask.id).where("studentId","==",currentUserObj.uid).get();
        if(!existing.empty){ alert("Вы уже проходили это задание!"); return; }
        currentElements = currentTask.elements;
        currentAnswers = new Array(currentElements.length).fill(null);
        currentStep = 0;
        document.getElementById("modalTaskTitle").innerText = currentTask.title;
        document.getElementById("quizModal").classList.remove("hidden");
        renderQuizStep();
    }
    function renderQuizStep() {
        let container = document.getElementById("quizContent");
        let el = currentElements[currentStep];
        let ans = currentAnswers[currentStep];
        let html = `<div class="mb-2 font-bold">Шаг ${currentStep+1} из ${currentElements.length}</div>`;
        if(el.imageBase64) html += `<img src="${el.imageBase64}" class="modal-photo my-2 max-h-32 rounded">`;
        if(el.type === 'text') html += `<div class="bg-gray-100 p-3 rounded">${el.content || "Информация"}</div>`;
        else if(el.type === 'choice') {
            html += `<div class="font-medium">${el.content}</div><div class="space-y-2 mt-2">`;
            el.options.forEach((opt,idx)=>{
                let selected = (ans && ans.selected === idx);
                html += `<div class="quiz-option p-2 rounded-xl cursor-pointer flex items-center gap-2" data-opt="${idx}"><div class="w-5 h-5 rounded-full border ${selected?'bg-indigo-600 border-indigo-600':'border-gray-300'}"></div> ${opt}</div>`;
            });
            html += `</div><div class="text-xs text-gray-400 mt-2">Баллов: ${el.points}</div>`;
        } else if(el.type === 'textarea') {
            html += `<div class="font-medium">${el.content}</div><textarea id="textareaAns" class="w-full border rounded-xl p-2 mt-2" rows="3" placeholder="Ваш ответ">${ans || ''}</textarea><div class="text-xs text-gray-400 mt-1">Баллов: ${el.points}</div>`;
        }
        container.innerHTML = html;
        document.getElementById("quizStepCounter").innerText = `${currentStep+1}/${currentElements.length}`;
        let prevBtn = document.getElementById("quizPrev"), nextBtn = document.getElementById("quizNext"), finalBtn = document.getElementById("quizFinal");
        if(currentStep === currentElements.length-1) { nextBtn.classList.add("hidden"); finalBtn.classList.remove("hidden"); }
        else { nextBtn.classList.remove("hidden"); finalBtn.classList.add("hidden"); }
        prevBtn.disabled = (currentStep === 0);
        if(el.type === 'choice') {
            document.querySelectorAll(".quiz-option").forEach(opt=>opt.addEventListener("click",(e)=>{
                let idx = parseInt(opt.dataset.opt);
                currentAnswers[currentStep] = {selected: idx};
                renderQuizStep();
            }));
        } else if(el.type === 'textarea') {
            let txt = document.getElementById("textareaAns");
            if(txt) txt.addEventListener("input",(e)=>{ currentAnswers[currentStep] = e.target.value; });
        } else if(el.type === 'text') { if(!currentAnswers[currentStep]) currentAnswers[currentStep] = "viewed"; }
    }
    document.getElementById("quizNext")?.addEventListener("click",()=>{ if(currentStep < currentElements.length-1){ currentStep++; renderQuizStep(); } });
    document.getElementById("quizPrev")?.addEventListener("click",()=>{ if(currentStep > 0){ currentStep--; renderQuizStep(); } });
    document.getElementById("quizFinal")?.addEventListener("click", async()=>{
        let total=0, earned=0;
        for(let i=0;i<currentElements.length;i++){
            let q = currentElements[i], a = currentAnswers[i];
            if(q.type === 'choice' && a) { total+=q.points; if(q.correctAnswer.includes(a.selected)) earned+=q.points; }
            else if(q.type === 'textarea' && a && a.trim().length>0) { total+=q.points; earned+=q.points; }
            else if(q.type === 'text') {}
            else total += q.points;
        }
        let percent = total? Math.round(earned/total*100):0;
        await db.collection("results").add({ taskId: currentTask.id, taskTitle: currentTask.title, studentId: currentUserObj.uid, studentEmail: currentUserObj.email, earnedPoints: earned, totalPoints: total, percent, completedAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert(`✅ Результат: ${earned}/${total} (${percent}%)`);
        document.getElementById("quizModal").classList.add("hidden");
        loadTasks();
    });
    document.getElementById("closeModalBtn")?.addEventListener("click",()=>document.getElementById("quizModal").classList.add("hidden"));
    function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g, m=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
</script>
</body>
</html>
