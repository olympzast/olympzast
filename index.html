<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Олимпиадская застава | Платформа знаний</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-slide { animation: fadeSlideUp 0.3s ease-out forwards; }
        .card-hover { transition: all 0.25s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.2); }
        .progress-line { transition: width 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .quiz-option { transition: all 0.2s ease; border: 1px solid #e2e8f0; }
        .quiz-option.selected { background-color: #eef2ff; border-color: #4f46e5; transform: scale(1.01); }
        .tab-active { color: #4f46e5; border-bottom: 3px solid #4f46e5; font-weight: 600; }
        .glass-modal { background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50/30 font-sans">

<div id="app">
    <!-- ЭКРАН ВХОДА -->
    <div id="authScreen" class="min-h-screen flex items-center justify-center p-5 bg-gradient-to-br from-indigo-900 via-purple-800 to-indigo-900">
        <div class="bg-white/95 backdrop-blur-sm rounded-3xl shadow-2xl max-w-md w-full p-8 animate-fade-slide">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-indigo-100 text-indigo-700 mb-3">
                    <i class="fas fa-shield-alt text-4xl"></i>
                </div>
                <h1 class="text-3xl font-extrabold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">Олимпиадская застава</h1>
                <p class="text-gray-500 text-sm">Вход в экосистему заданий</p>
            </div>
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-1">Email</label>
                    <input type="email" id="loginEmail" class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-indigo-400" placeholder="teacher@school.ru" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-1">Пароль</label>
                    <input type="password" id="loginPassword" class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-indigo-400" required>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl transition transform active:scale-95 shadow-md"><i class="fas fa-arrow-right-to-bracket mr-2"></i> Войти</button>
            </form>
            <div class="mt-5 text-center text-xs text-gray-400">Аккаунты создаются администратором в Firebase</div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="mainApp" class="hidden min-h-screen flex flex-col">
        <header class="bg-white/80 backdrop-blur-sm shadow-md sticky top-0 z-20 px-6 py-3 flex justify-between items-center flex-wrap border-b border-indigo-100">
            <div class="flex items-center space-x-2">
                <i class="fas fa-fort-awesome text-2xl text-indigo-700"></i>
                <span class="font-bold text-xl bg-gradient-to-r from-indigo-800 to-purple-800 bg-clip-text text-transparent">Олимпиадская застава</span>
                <span id="roleBadge" class="ml-2 text-xs bg-gray-200 px-2.5 py-1 rounded-full font-medium"></span>
            </div>
            <div class="flex items-center space-x-4">
                <span id="userEmailSpan" class="text-sm text-gray-600 font-medium hidden md:inline"></span>
                <button id="logoutBtn" class="bg-red-500/10 hover:bg-red-500 text-red-600 hover:text-white transition px-4 py-1.5 rounded-full text-sm font-medium"><i class="fas fa-sign-out-alt mr-1"></i> Выйти</button>
            </div>
        </header>

        <div class="border-b border-gray-200 bg-white/60 backdrop-blur-sm px-6 sticky top-[60px] z-10">
            <div class="flex space-x-6">
                <button data-tab="tasks" class="tab-btn py-3 px-1 font-medium transition-all"><i class="fas fa-tasks mr-1"></i> Задания</button>
                <button data-tab="constructor" class="tab-btn py-3 px-1 font-medium transition-all hidden mentor-only"><i class="fas fa-pen-ruler mr-1"></i> Конструктор</button>
                <button data-tab="results" class="tab-btn py-3 px-1 font-medium transition-all hidden mentor-only"><i class="fas fa-chart-line mr-1"></i> Результаты</button>
            </div>
        </div>

        <div class="flex-1 p-6 max-w-7xl mx-auto w-full">
            <div id="tasksPanel" class="tab-content">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-2xl font-bold text-gray-800"><i class="fas fa-layer-group text-indigo-500 mr-2"></i>Активные штурмы</h2>
                </div>
                <div id="tasksList" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">Загрузка...</div>
            </div>

            <div id="constructorPanel" class="tab-content hidden">
                <div class="bg-white rounded-2xl shadow-xl p-6 mb-8">
                    <h3 class="text-xl font-bold"><i class="fas fa-hammer text-indigo-600"></i> Собрать задание</h3>
                    <div class="grid md:grid-cols-2 gap-5 mt-4">
                        <div><label class="font-semibold">Название</label><input type="text" id="taskName" class="w-full border rounded-xl p-2.5" placeholder="Напр: Математический бой"></div>
                        <div><label class="font-semibold">Класс</label><input type="text" id="taskClass" class="w-full border rounded-xl p-2.5" placeholder="7А, 8Б"></div>
                    </div>
                    <div class="border-t mt-4 pt-4">
                        <div class="font-semibold mb-3">Конструктор этапов:</div>
                        <div id="elementsContainer" class="space-y-4 max-h-96 overflow-y-auto"></div>
                        <div class="flex gap-2 mt-3">
                            <button id="addTextElement" class="bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-full text-sm"><i class="fas fa-paragraph mr-1"></i> Текст</button>
                            <button id="addChoiceElement" class="bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-full text-sm"><i class="fas fa-list-ul mr-1"></i> Выбор ответа</button>
                            <button id="addTextareaElement" class="bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-full text-sm"><i class="fas fa-edit mr-1"></i> Текстовое поле</button>
                        </div>
                    </div>
                    <div class="flex justify-end mt-6"><button id="publishTaskBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 px-7 rounded-xl"><i class="fas fa-cloud-upload-alt mr-2"></i> Опубликовать</button></div>
                </div>
                <div class="bg-white rounded-2xl shadow p-5"><h4 class="font-bold mb-3"><i class="fas fa-scroll"></i> Мои публикации</h4><div id="myPublishedTasks"></div></div>
            </div>

            <div id="resultsPanel" class="tab-content hidden">
                <div class="bg-white rounded-2xl shadow-xl p-6"><h3 class="text-xl font-bold mb-4"><i class="fas fa-trophy text-yellow-500"></i> Статистика</h3><div id="resultsContainer">Загрузка...</div></div>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ПРОХОЖДЕНИЯ -->
    <div id="quizModal" class="fixed inset-0 glass-modal flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="sticky top-0 bg-white/95 border-b p-5 rounded-t-2xl">
                <div class="flex justify-between items-center mb-2">
                    <h2 id="modalTaskTitle" class="text-2xl font-bold text-indigo-800"></h2>
                    <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600 text-3xl">&times;</button>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-2.5 mt-2">
                    <div id="progressFill" class="bg-indigo-600 h-2.5 rounded-full progress-line" style="width:0%"></div>
                </div>
                <div class="flex justify-between text-xs text-gray-500 mt-1"><span>Прогресс</span><span id="stepCounterText">0/0</span></div>
            </div>
            <div id="quizStepsContainer" class="p-6 space-y-6 min-h-[300px]"></div>
            <div class="flex justify-between items-center p-5 border-t bg-gray-50 rounded-b-2xl">
                <button id="prevQuestBtn" class="bg-gray-200 hover:bg-gray-300 px-5 py-2 rounded-xl disabled:opacity-40"><i class="fas fa-arrow-left"></i> Назад</button>
                <span id="stepMiddle" class="text-sm text-gray-500"></span>
                <button id="nextQuestBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl">Далее <i class="fas fa-arrow-right"></i></button>
                <button id="finalSubmitBtn" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-xl hidden">🏆 Завершить</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== FIREBASE КОНФИГ (ВАШИ КЛЮЧИ) ==========
    const firebaseConfig = {
        apiKey: "AIzaSyDT6xPjDxldqrmjWuG-VF7AVoot-RFUkH0",
        authDomain: "olymp-e7d79.firebaseapp.com",
        projectId: "olymp-e7d79",
        storageBucket: "olymp-e7d79.firebasestorage.app",
        messagingSenderId: "212523217131",
        appId: "1:212523217131:web:6acdbf9443cf4f22440eae",
        measurementId: "G-R134K8XESV"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null, userRole = null, userClass = null;
    let currentTaskToSolve = null, currentAnswers = [], questionElements = [], currentStepIndex = 0;
    
    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-5 py-2 rounded-full text-sm z-[100] shadow-lg animate-fade-slide';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2700);
    }
    
    async function fetchUserRole(uid) {
        try {
            let doc = await db.collection("users").doc(uid).get();
            if(doc.exists) {
                userRole = doc.data().role;
                userClass = doc.data().class || "";
                return true;
            } else { showToast("Ошибка: роль не назначена"); return false; }
        } catch(e) { console.error(e); return false; }
    }
    
    auth.onAuthStateChanged(async (user) => {
        if(user) {
            currentUser = user;
            let ok = await fetchUserRole(user.uid);
            if(!ok) { auth.signOut(); return; }
            document.getElementById("userEmailSpan").innerText = user.email;
            document.getElementById("roleBadge").innerHTML = userRole === "mentor" ? '<i class="fas fa-chalkboard-user mr-1"></i> Наставник' : '<i class="fas fa-graduation-cap mr-1"></i> Ученик';
            document.getElementById("authScreen").classList.add("hidden");
            document.getElementById("mainApp").classList.remove("hidden");
            
            if(userRole !== "mentor") {
                document.querySelectorAll(".mentor-only").forEach(el => el.classList.add("hidden"));
                switchTab("tasks");
            } else {
                document.querySelectorAll(".mentor-only").forEach(el => el.classList.remove("hidden"));
                switchTab("tasks");
                loadMyTasksForMentor();
                loadResultsOverview();
            }
            loadTasksList();
        } else {
            document.getElementById("authScreen").classList.remove("hidden");
            document.getElementById("mainApp").classList.add("hidden");
            currentUser = null; userRole = null;
        }
    });
    
    document.getElementById("loginForm").addEventListener("submit", async(e)=>{
        e.preventDefault();
        let email = document.getElementById("loginEmail").value;
        let pwd = document.getElementById("loginPassword").value;
        try{
            await auth.signInWithEmailAndPassword(email,pwd);
            showToast("Добро пожаловать!");
        }catch(err){ showToast("Ошибка: "+err.message); }
    });
    document.getElementById("logoutBtn")?.addEventListener("click",()=>auth.signOut());
    
    function switchTab(tabId){
        document.querySelectorAll(".tab-content").forEach(el=>el.classList.add("hidden"));
        document.getElementById(`${tabId}Panel`).classList.remove("hidden");
        document.querySelectorAll(".tab-btn").forEach(btn=>{
            btn.classList.remove("tab-active");
            if(btn.dataset.tab === tabId) btn.classList.add("tab-active");
        });
        if(tabId === "results" && userRole === "mentor") loadResultsOverview();
    }
    document.querySelectorAll(".tab-btn").forEach(btn=>btn.addEventListener("click",()=>switchTab(btn.dataset.tab)));
    
    async function loadTasksList(){
        let container = document.getElementById("tasksList");
        if(!container) return;
        container.innerHTML = '<div class="col-span-full text-center py-10"><i class="fas fa-spinner fa-pulse text-indigo-500 text-2xl"></i></div>';
        try{
            let q;
            if(userRole === "student") q = await db.collection("tasks").where("targetClass","==",userClass).where("published","==",true).get();
            else q = await db.collection("tasks").where("published","==",true).get();
            let tasks = [];
            q.forEach(doc=>tasks.push({id:doc.id, ...doc.data()}));
            if(tasks.length===0){ container.innerHTML='<div class="col-span-full text-center text-gray-400 bg-white rounded-2xl p-8">Нет активных заданий</div>'; return; }
            container.innerHTML = "";
            tasks.forEach(task=>{
                let card = document.createElement("div");
                card.className = "bg-white rounded-2xl shadow-md p-5 card-hover border border-gray-100";
                card.innerHTML = `<div class="flex justify-between items-start"><h3 class="font-bold text-lg">${escapeHtml(task.title)}</h3><span class="text-xs bg-indigo-50 text-indigo-700 px-2 py-1 rounded-full">${task.targetClass}</span></div>
                <p class="text-gray-500 text-sm mt-2"><i class="fas fa-puzzle-piece"></i> ${task.elements?.length || 0} этапов</p>
                <button data-taskid="${task.id}" class="startTaskBtn mt-4 w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-semibold py-2 rounded-xl transition flex items-center justify-center gap-2"><i class="fas fa-play"></i> ${userRole==="student"?"Пройти":"Просмотр"}</button>`;
                container.appendChild(card);
            });
            document.querySelectorAll(".startTaskBtn").forEach(btn=>btn.addEventListener("click", async(e)=>{
                let taskId = btn.dataset.taskid;
                let snap = await db.collection("tasks").doc(taskId).get();
                if(snap.exists){
                    currentTaskToSolve = {id:snap.id, ...snap.data()};
                    if(userRole==="student") startStudentQuiz();
                    else showToast("Режим наставника: предпросмотр");
                }
            }));
        }catch(e){ container.innerHTML='<div>Ошибка</div>'; console.error(e);}
    }
    
    // КОНСТРУКТОР
    let elementsArray = [];
    function renderElementsBuilder(){
        let container = document.getElementById("elementsContainer");
        if(!container) return;
        container.innerHTML = "";
        elementsArray.forEach((el,idx)=>{
            let div = document.createElement("div");
            div.className = "border-l-4 border-indigo-300 bg-gray-50 p-3 rounded-lg";
            div.innerHTML = `<div class="flex justify-between"><b>${el.type==='text'?'📄 Текст':el.type==='choice'?'🔘 Выбор':'✏️ Текст. ответ'}</b><button data-idx="${idx}" class="delElemBtn text-red-400 text-sm">Удалить</button></div>`;
            if(el.type==='text') div.innerHTML += `<textarea placeholder="Текст" class="w-full border rounded p-2 mt-1">${el.content||''}</textarea><input placeholder="Баллы (0)" class="w-24 border p-1 mt-1" value="${el.points||0}">`;
            else if(el.type==='choice'){
                div.innerHTML += `<input placeholder="Вопрос" class="w-full border p-2 mt-1" value="${el.content||''}"><div class="mt-1">Варианты (через запятую): <input id="opts_${idx}" class="w-full border p-1" value="${el.options?.join(',')||''}"></div>
                <div>Правильные (индексы 0..): <input id="correct_${idx}" value="${el.correctAnswer?.join(',')||''}" class="border p-1 w-full"></div>
                <input placeholder="Макс балл" class="w-24 border p-1 mt-1" value="${el.points||1}">`;
            } else if(el.type==='textarea'){
                div.innerHTML += `<label>Вопрос</label><textarea class="w-full border p-2 mt-1">${el.content||''}</textarea><input placeholder="Баллы" class="w-24 border p-1 mt-1" value="${el.points||1}">`;
            }
            container.appendChild(div);
        });
        document.querySelectorAll(".delElemBtn").forEach(btn=>btn.addEventListener("click",(e)=>{ let idx=btn.dataset.idx; elementsArray.splice(idx,1); renderElementsBuilder(); }));
    }
    document.getElementById("addTextElement")?.addEventListener("click",()=>{ elementsArray.push({type:"text", content:"", points:0}); renderElementsBuilder(); });
    document.getElementById("addChoiceElement")?.addEventListener("click",()=>{ elementsArray.push({type:"choice", content:"", options:[], correctAnswer:[], points:1}); renderElementsBuilder(); });
    document.getElementById("addTextareaElement")?.addEventListener("click",()=>{ elementsArray.push({type:"textarea", content:"", points:1}); renderElementsBuilder(); });
    document.getElementById("publishTaskBtn")?.addEventListener("click",async()=>{
        let title = document.getElementById("taskName").value, targetClass = document.getElementById("taskClass").value;
        if(!title || !targetClass){ showToast("Название и класс обязательны"); return; }
        let finalElements = [];
        let elemsDivs = document.querySelectorAll("#elementsContainer > div");
        for(let i=0;i<elementsArray.length;i++){
            let el = elementsArray[i];
            let wrap = elemsDivs[i];
            if(el.type==='text'){
                let txt = wrap.querySelector("textarea")?.value, pts = parseInt(wrap.querySelector("input[placeholder*='Баллы']")?.value)||0;
                finalElements.push({type:"text", content:txt, points:pts});
            } else if(el.type==='choice'){
                let q = wrap.querySelector("input[placeholder='Вопрос']")?.value;
                let optsRaw = wrap.querySelector(`#opts_${i}`)?.value, optsArr = optsRaw.split(",").map(s=>s.trim());
                let correctRaw = wrap.querySelector(`#correct_${i}`)?.value, correctIdx = correctRaw.split(",").map(s=>parseInt(s.trim())).filter(n=>!isNaN(n));
                let pts = parseInt(wrap.querySelector("input[placeholder='Макс балл']")?.value)||1;
                finalElements.push({type:"choice", content:q, options:optsArr, correctAnswer:correctIdx, points:pts});
            } else if(el.type==='textarea'){
                let q = wrap.querySelector("textarea")?.value, pts = parseInt(wrap.querySelector("input[placeholder*='Баллы']")?.value)||1;
                finalElements.push({type:"textarea", content:q, points:pts});
            }
        }
        if(finalElements.length===0){ showToast("Добавьте хотя бы один этап"); return; }
        await db.collection("tasks").add({ title, targetClass, elements:finalElements, published:true, createdBy:currentUser.uid, createdAt:firebase.firestore.FieldValue.serverTimestamp() });
        showToast("Задание опубликовано!");
        elementsArray = []; renderElementsBuilder(); document.getElementById("taskName").value=""; document.getElementById("taskClass").value="";
        loadMyTasksForMentor(); loadTasksList();
    });
    async function loadMyTasksForMentor(){ if(userRole!=="mentor") return; let snap=await db.collection("tasks").where("createdBy","==",currentUser.uid).get(); let cont=document.getElementById("myPublishedTasks"); if(!cont) return; cont.innerHTML=""; snap.forEach(doc=>{ let div=document.createElement("div"); div.className="border-b p-2 flex justify-between"; div.innerHTML=`<span>${doc.data().title} (${doc.data().targetClass})</span><button data-id="${doc.id}" class="deleteTaskBtn text-red-500 text-sm">Удалить</button>`; cont.appendChild(div); }); document.querySelectorAll(".deleteTaskBtn").forEach(btn=>btn.addEventListener("click",async(e)=>{ if(confirm("Удалить?")){ await db.collection("tasks").doc(btn.dataset.id).delete(); loadMyTasksForMentor(); loadTasksList(); } }));
    }
    async function loadResultsOverview(){ if(userRole!=="mentor") return; let resultsSnap=await db.collection("results").get(); let container=document.getElementById("resultsContainer"); if(!container) return; if(resultsSnap.empty){ container.innerHTML="<div class='text-center text-gray-400'>Нет прохождений</div>"; return; } let grouped={}; resultsSnap.forEach(doc=>{ let r=doc.data(); if(!grouped[r.taskId]) grouped[r.taskId]={title:r.taskTitle, entries:[]}; grouped[r.taskId].entries.push(r); }); container.innerHTML=""; for(let tid in grouped){ let block=document.createElement("div"); block.className="bg-indigo-50/30 rounded-xl p-4"; block.innerHTML=`<div class="font-bold text-lg">${grouped[tid].title}</div><table class="w-full text-sm mt-2"><thead><tr><th>Ученик</th><th>Баллы</th><th>%</th><th>Дата</th></tr></thead><tbody>`; grouped[tid].entries.forEach(e=>{ block.innerHTML+=`<tr><td>${e.studentEmail}</td><td>${e.earnedPoints}/${e.totalPoints}</td><td>${e.percent}%</td><td>${e.completedAt?.toDate().toLocaleString()||"—"}</td></tr>`; }); block.innerHTML+=`</tbody></table>`; container.appendChild(block); } }
    
    async function startStudentQuiz(){
        let task = currentTaskToSolve;
        let existing = await db.collection("results").where("taskId","==",task.id).where("studentId","==",currentUser.uid).get();
        if(!existing.empty){ showToast("Вы уже проходили это задание!"); return; }
        currentAnswers = new Array(task.elements.length).fill(null);
        questionElements = task.elements;
        currentStepIndex = 0;
        document.getElementById("modalTaskTitle").innerText = task.title;
        document.getElementById("quizModal").classList.remove("hidden");
        updateProgressAndRender();
    }
    function updateProgressAndRender(){
        let total = questionElements.length;
        let answeredCount = currentAnswers.filter(a=> a !== null && a !== undefined).length;
        let percent = total === 0 ? 0 : (answeredCount / total) * 100;
        document.getElementById("progressFill").style.width = `${percent}%`;
        document.getElementById("stepCounterText").innerText = `${answeredCount}/${total} отвечено`;
        renderCurrentStep();
    }
    function renderCurrentStep(){
        let container = document.getElementById("quizStepsContainer");
        let el = questionElements[currentStepIndex];
        let answerVal = currentAnswers[currentStepIndex];
        let html = `<div class="animate-fade-slide"><div class="flex items-center gap-2 mb-4"><span class="bg-indigo-100 text-indigo-800 rounded-full w-8 h-8 flex items-center justify-center font-bold">${currentStepIndex+1}</span><span class="font-semibold">${el.type==='text'?'Информация':el.type==='choice'?'Выбор ответа':'Открытый ответ'}</span></div>`;
        if(el.type === 'text'){ html+=`<div class="bg-gray-50 p-5 rounded-xl">${el.content||'Инфоблок'}</div>`; currentAnswers[currentStepIndex] = currentAnswers[currentStepIndex] || "viewed"; }
        else if(el.type === 'choice'){
            html+=`<div class="font-medium text-lg">${el.content}</div><div class="mt-4 space-y-3">`;
            el.options.forEach((opt,idx)=>{
                let isSelected = (answerVal && answerVal.selectedIndex === idx);
                html+=`<div class="quiz-option p-3 rounded-xl cursor-pointer flex items-center gap-3" data-choice-idx="${idx}"><div class="w-5 h-5 rounded-full border-2 ${isSelected?'border-indigo-600 bg-indigo-600':'border-gray-300'} flex items-center justify-center"><div class="w-2 h-2 rounded-full bg-white ${isSelected?'opacity-100':'opacity-0'}"></div></div><span>${opt}</span></div>`;
            });
            html+=`</div><div class="text-xs text-gray-400 mt-2">Макс балл: ${el.points}</div>`;
        } else if(el.type === 'textarea'){
            html+=`<div><label class="font-semibold">${el.content}</label><textarea id="textAnswerField" class="w-full border rounded-xl p-3 mt-2" rows="4" placeholder="Ваш ответ...">${answerVal || ''}</textarea><div class="text-xs text-gray-400 mt-1">Баллы: ${el.points}</div></div>`;
        }
        html+=`</div>`;
        container.innerHTML = html;
        document.getElementById("stepMiddle").innerHTML = `${currentStepIndex+1} / ${questionElements.length}`;
        let prevBtn = document.getElementById("prevQuestBtn"), nextBtn = document.getElementById("nextQuestBtn"), finalBtn = document.getElementById("finalSubmitBtn");
        prevBtn.disabled = (currentStepIndex === 0);
        if(currentStepIndex === questionElements.length-1) { nextBtn.classList.add("hidden"); finalBtn.classList.remove("hidden"); }
        else { nextBtn.classList.remove("hidden"); finalBtn.classList.add("hidden"); }
        if(el.type === 'choice'){
            document.querySelectorAll(".quiz-option").forEach(opt=>opt.addEventListener("click",(e)=>{
                let idx = parseInt(opt.dataset.choiceIdx);
                currentAnswers[currentStepIndex] = {selectedIndex: idx};
                updateProgressAndRender();
            }));
        } else if(el.type === 'textarea'){
            let txt = document.getElementById("textAnswerField");
            if(txt) txt.addEventListener("input",(e)=>{ currentAnswers[currentStepIndex] = e.target.value; updateProgressAndRender(); });
        } else if(el.type === 'text'){ updateProgressAndRender(); }
    }
    document.getElementById("nextQuestBtn")?.addEventListener("click",()=>{ if(currentStepIndex < questionElements.length-1) { currentStepIndex++; updateProgressAndRender(); } });
    document.getElementById("prevQuestBtn")?.addEventListener("click",()=>{ if(currentStepIndex > 0) { currentStepIndex--; updateProgressAndRender(); } });
    document.getElementById("finalSubmitBtn")?.addEventListener("click",async()=>{
        let total=0, earned=0;
        for(let i=0;i<questionElements.length;i++){
            let q=questionElements[i], ans=currentAnswers[i];
            if(q.type==='choice' && ans){ if(q.correctAnswer.includes(ans.selectedIndex)) earned+=q.points; total+=q.points; }
            else if(q.type==='textarea' && ans && ans.toString().trim().length>0){ earned+=q.points; total+=q.points; }
            else if(q.type==='text'){}
            else total+=q.points;
        }
        let percent = total>0 ? Math.round((earned/total)*100) : 0;
        await db.collection("results").add({ taskId: currentTaskToSolve.id, taskTitle: currentTaskToSolve.title, studentId: currentUser.uid, studentEmail: currentUser.email, earnedPoints: earned, totalPoints: total, percent: percent, completedAt: firebase.firestore.FieldValue.serverTimestamp() });
        showToast(`🏆 Результат: ${earned}/${total} (${percent}%)`);
        document.getElementById("quizModal").classList.add("hidden");
        loadTasksList();
    });
    document.getElementById("closeModalBtn")?.addEventListener("click",()=>document.getElementById("quizModal").classList.add("hidden"));
    
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
</script>
</body>
</html>
